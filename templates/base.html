<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Budget Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; color: #333; }
        .navbar { background: #2c3e50; padding: 15px 30px; color: white; font-size: 20px; font-weight: bold; }
        .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
        .cards { display: flex; gap: 20px; margin-bottom: 30px; }
        .card { flex: 1; background: white; padding: 20px; border-radius: 10px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .card h3 { font-size: 14px; color: #888; margin-bottom: 8px; }
        .card p { font-size: 28px; font-weight: bold; }
        .income { color: #27ae60; }
        .expense { color: #e74c3c; }
        .balance { color: #2980b9; }
        .btn { display: inline-block; padding: 10px 20px; background: #2c3e50; color: white; border-radius: 8px; text-decoration: none; margin-bottom: 20px; }
        .btn:hover { background: #34495e; }
        table { width: 100%; background: white; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); border-collapse: collapse; }
        th { background: #2c3e50; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        tr:last-child td { border-bottom: none; }
        .delete { color: #e74c3c; text-decoration: none; font-weight: bold; }
        .form-group { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .form-group button { padding: 12px 30px; background: #27ae60; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        .form-group button:hover { background: #2ecc71; }
    </style>
</head>
<body>
    <div class="navbar">🎓 Student Budget Tracker</div>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
